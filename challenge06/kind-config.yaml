# ============================================================
#  LabLabee – Challenge 5: Open Gateway and CAMARA
#  Kind Cluster Configuration
# ============================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: camara-lab

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      - containerPort: 30083
        hostPort: 8083
        protocol: TCP
      - containerPort: 30084
        hostPort: 8084
        protocol: TCP
      - containerPort: 30085
        hostPort: 8085
        protocol: TCP
